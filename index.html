<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enquiry Form</title>
  <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
</head>
<body>

<lightning-out-application
  app-id="1UsdN00000025rdSAA"
  components="c-learning-program-form"
></lightning-out-application>

<script>
// Step 1: Redirect user to Salesforce login
// You need to implement the OAuth 2.0 Authorization Code Flow
// Here's a simplified example - in production, handle the callback properly

async function initLightningOut() {
  // Option A: Get token from URL after OAuth redirect
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  
  if (!code) {
    const clientId = '3MVG9GBhY6wQjl2uGwI77CbrWiUlVtg4LnMmf3oNCsQWxBFyRqGqfTuBMKo9spG0P8MiVkIcMLWnHt0nux63e';
    const redirectUri = window.location.origin + window.location.pathname;
    const authUrl = `https://creationtechnology4.my.salesforce.com/services/oauth2/authorize?` +
      `response_type=code&client_id=${clientId}&redirect_uri=${redirectUri}` +
      `&scope=web api`; // 'web' scope is REQUIRED for LO2
    
    window.location.href = authUrl;
    return;
  }
  
  // Exchange code for token (call your backend)
  const tokenResponse = await fetch('/api/exchange-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ code, redirectUri: window.location.origin })
  });
  
  const { accessToken, instanceUrl } = await tokenResponse.json();
  
  // Get frontdoor URL using the user token
  const frontdoorResponse = await fetch('https://lightning-out2.vercel.app/api/frontdoor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ accessToken, instanceUrl })
  });
  
  const { frontdoorUrl } = await frontdoorResponse.json();
  
  // Initialize Lightning Out
  const app = document.querySelector('lightning-out-application');
  app.setAttribute('frontdoor-url', frontdoorUrl);
}

initLightningOut();
</script>

</body>
</html>
