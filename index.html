<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment - Lightning Out 2.0</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Salesforce Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f3f3 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        #app-wrapper {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            min-height: 600px;
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #0070d2;
            border-bottom: 2px solid #0070d2;
            padding-bottom: 0.5rem;
        }

        .host-controls {
            margin-top: 1rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #0070d2;
        }

        .host-controls button {
            background: #0070d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }

        .host-controls button:hover {
            background: #005fb2;
        }

        .message-area {
            margin-top: 1rem;
            padding: 1rem;
            background: #e8f0fe;
            border-radius: 8px;
            display: none;
        }

        .message-area.show {
            display: block;
        }

        #loading {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 14px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-container {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #c23934;
        }

        #error-container p { margin-bottom: 16px; font-size: 14px; }
        #error-container button {
            padding: 10px 24px;
            background: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        #lo-container {
            width: 100%;
            min-height: 400px;
            margin: 1rem 0;
        }

        #debug-info {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            display: none;
            border-left: 3px solid #0070d2;
            max-height: 300px;
            overflow-y: auto;
        }

        #debug-info.show {
            display: block;
        }

        #debug-info pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 10px;
            line-height: 1.4;
        }

        /* Lightning Out 2.0 requires CSS custom properties (-- prefix) */
        c-learning-program-form {
            display: block;
            width: 100%;
            min-height: 400px;
        }
        
        /* Force iframe visibility */
        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 400px !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <h1>📚 Learning Program Enrollment</h1>
        
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading enrollment form…</div>
            <div style="font-size:12px;color:#888;margin-top:8px;">
                Connecting to Salesforce securely
            </div>
        </div>

        <div id="error-container">
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <!-- Container for Lightning Out components -->
        <div id="lo-container"></div>

        <!-- Host page controls to communicate with the embedded component -->
        <div class="host-controls">
            <h3 style="margin-bottom: 10px;">🎮 Host Page Controls</h3>
            <p style="margin-bottom: 10px; font-size: 14px; color: #666;">
                Send messages or trigger actions in the embedded Salesforce component
            </p>
            <button id="sendMessageBtn">📨 Send Message to Component</button>
            <button id="triggerActionBtn">⚡ Trigger Component Action</button>
            <button id="refreshBtn">🔄 Refresh Component</button>
        </div>

        <div id="hostMessageArea" class="message-area">
            <strong>📬 Message from Component:</strong>
            <div id="hostMessageContent"></div>
        </div>

        <div id="debugInfo" class="message-area">
            <strong>🔧 Status:</strong>
            <div id="statusContent"></div>
        </div>

        <div id="debug-info">
            <strong>🔍 Debug Information</strong>
            <pre id="debug-content"></pre>
        </div>
    </div>

    <script>
        // DOM Elements
        const loadingDiv = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const loContainer = document.getElementById('lo-container');
        const debugDiv = document.getElementById('debug-info');
        const debugContent = document.getElementById('debug-content');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const triggerActionBtn = document.getElementById('triggerActionBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const hostMessageArea = document.getElementById('hostMessageArea');
        const hostMessageContent = document.getElementById('hostMessageContent');
        const statusContent = document.getElementById('statusContent');
        
        // State
        let debugMessages = [];
        let lightningOutApp = null;
        let learningProgramComponent = null;
        let isInitialized = false;

        // Helper: Add debug message
        function addDebug(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            debugMessages.unshift({ timestamp, message, data });
            if (debugMessages.length > 30) debugMessages.pop();
            
            debugContent.textContent = debugMessages.map(m => 
                `[${m.timestamp}] ${m.message}${m.data ? '\n' + JSON.stringify(m.data, null, 2) : ''}`
            ).join('\n\n');
            
            if (!debugDiv.classList.contains('show')) {
                debugDiv.classList.add('show');
            }
            console.log(`[${timestamp}]`, message, data || '');
            
            // Update status
            statusContent.innerHTML = `<small>[${timestamp}] ${message}</small><br>${statusContent.innerHTML}`;
            if (statusContent.children.length > 5) {
                statusContent.removeChild(statusContent.lastChild);
            }
        }

        // Helper: Show error
        function showError(msg, details = null) {
            addDebug('❌ ERROR: ' + msg, details);
            loadingDiv.style.display = 'none';
            errorMessage.innerHTML = msg;
            errorContainer.style.display = 'block';
        }

        // Helper: Show host message
        function showHostMessage(message, type = 'info') {
            hostMessageContent.innerHTML = `
                <div style="padding: 10px; background: ${type === 'error' ? '#fee' : '#e8f0fe'}; border-radius: 4px;">
                    <strong>${new Date().toLocaleTimeString()}:</strong> ${message}
                </div>
            `;
            hostMessageArea.classList.add('show');
            setTimeout(() => {
                hostMessageArea.classList.remove('show');
            }, 5000);
        }

        // Helper: Get frontdoor URL from API
        async function getFrontdoorUrl() {
            addDebug('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                addDebug(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                addDebug('API Response received', { 
                    hasFrontdoorUrl: !!data.frontdoorUrl
                });
                
                if (!data.frontdoorUrl) {
                    throw new Error('No frontdoorUrl in API response');
                }
                
                return data.frontdoorUrl;
            } catch (error) {
                addDebug(`Failed to get frontdoor URL: ${error.message}`);
                throw error;
            }
        }

        // Set up event listener for messages FROM the component
        function setupComponentEventListeners() {
            if (!learningProgramComponent) {
                addDebug('Component not found, cannot set up event listeners');
                return;
            }
            
            addDebug('Setting up event listeners on component');
            
            // Listen for custom events from the LWC component
            // The component should dispatch events with bubbles: true, composed: true
            learningProgramComponent.addEventListener('componentReady', (event) => {
                addDebug('🎉 Component signaled it\'s ready', event.detail);
                showHostMessage('Component is ready! ' + JSON.stringify(event.detail));
            });
            
            learningProgramComponent.addEventListener('formSubmitted', (event) => {
                addDebug('📝 Form submitted event received', event.detail);
                showHostMessage(`Form submitted! Data: ${JSON.stringify(event.detail)}`);
            });
            
            learningProgramComponent.addEventListener('formError', (event) => {
                addDebug('❌ Form error event received', event.detail);
                showHostMessage(`Error: ${event.detail?.message || 'Unknown error'}`, 'error');
            });
            
            learningProgramComponent.addEventListener('dataLoaded', (event) => {
                addDebug('📊 Data loaded event received', event.detail);
                showHostMessage(`Data loaded: ${JSON.stringify(event.detail)}`);
            });
            
            // Generic catch-all for any custom events
            learningProgramComponent.addEventListener('message', (event) => {
                if (event.detail) {
                    addDebug('📨 Generic message event', event.detail);
                }
            });
            
            addDebug('Event listeners configured');
        }

        // Send message TO the component
        function sendMessageToComponent(message) {
            if (!learningProgramComponent) {
                addDebug('Cannot send message: component not found');
                showHostMessage('Component not loaded yet. Please wait.', 'error');
                return;
            }
            
            addDebug(`Sending message to component: ${message}`);
            
            // Create custom event with required properties
            const event = new CustomEvent('hostMessage', {
                detail: {
                    message: message,
                    timestamp: new Date().toISOString(),
                    source: 'host-page'
                },
                bubbles: true,  // Must be true to cross shadow DOM
                composed: true   // Must be true to cross iframe boundary
            });
            
            learningProgramComponent.dispatchEvent(event);
            addDebug('Message dispatched to component');
            showHostMessage(`Message sent: "${message}"`);
        }

        // Trigger action on component
        function triggerComponentAction(action, data = {}) {
            if (!learningProgramComponent) {
                addDebug('Cannot trigger action: component not found');
                showHostMessage('Component not loaded yet. Please wait.', 'error');
                return;
            }
            
            addDebug(`Triggering action on component: ${action}`, data);
            
            const event = new CustomEvent('triggerAction', {
                detail: {
                    action: action,
                    data: data,
                    timestamp: new Date().toISOString()
                },
                bubbles: true,
                composed: true
            });
            
            learningProgramComponent.dispatchEvent(event);
            showHostMessage(`Action "${action}" triggered`);
        }

        // Main initialization following Salesforce Lightning Out 2.0 best practices
        async function init() {
            addDebug('🚀 Initializing Lightning Out 2.0 App');
            
            try {
                // Clear container
                loContainer.innerHTML = '';
                
                // Step 1: Load the Lightning Out library dynamically
                addDebug('Loading Lightning Out library...');
                
                // Check if already loaded
                if (typeof $Lightning !== 'undefined') {
                    addDebug('Lightning library already loaded');
                } else {
                    await new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = 'https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js';
                        script.async = true;
                        script.onload = () => {
                            addDebug('✅ Lightning Out library loaded');
                            resolve();
                        };
                        script.onerror = () => {
                            reject(new Error('Failed to load Lightning Out library'));
                        };
                        document.head.appendChild(script);
                    });
                }
                
                // Step 2: Get frontdoor URL for authentication
                const frontdoorUrl = await getFrontdoorUrl();
                addDebug(`Frontdoor URL obtained`);
                
                // Step 3: Create lightning-out-application element (required wrapper)
                lightningOutApp = document.createElement('lightning-out-application');
                lightningOutApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                lightningOutApp.setAttribute('components', 'c-learning-program-form');
                lightningOutApp.style.display = 'block';
                lightningOutApp.style.width = '100%';
                lightningOutApp.style.minHeight = '400px';
                
                addDebug('Created lightning-out-application element');
                
                // Step 4: Create the actual component element
                learningProgramComponent = document.createElement('c-learning-program-form');
                
                // Set component styles using CSS custom properties (-- prefix)
                learningProgramComponent.setAttribute('style', `
                    --slds-c-card-color-background: #ffffff;
                    --slds-c-card-text-color: #1a1a1a;
                    --slds-c-card-color-border: #0070d2;
                    --custom-primary-color: #0070d2;
                    --custom-border-radius: 8px;
                `);
                
                // Set any custom @api properties (if your component supports them)
                // learningProgramComponent.setAttribute('program-id', '12345');
                // learningProgramComponent.setAttribute('user-id', 'user123');
                
                addDebug('Created c-learning-program-form component');
                
                // Step 5: Set up event listeners BEFORE appending to DOM
                setupComponentEventListeners();
                
                // Step 6: Set up lightning-out-application event listeners
                lightningOutApp.addEventListener('lo.application.ready', () => {
                    addDebug('✅ lo.application.ready - App loaded');
                    loadingDiv.style.display = 'none';
                    isInitialized = true;
                    
                    // Set frontdoor URL after app is ready
                    lightningOutApp.setAttribute('frontdoor-url', frontdoorUrl);
                    addDebug('Frontdoor URL set on app');
                });
                
                lightningOutApp.addEventListener('lo.iframe.load', (event) => {
                    addDebug('📄 lo.iframe.load - Iframe loaded', { origin: event.detail });
                    loadingDiv.style.display = 'none';
                    
                    // Component should be ready now
                    setTimeout(() => {
                        addDebug('Component should be fully interactive now');
                        showHostMessage('Component loaded successfully!');
                        
                        // Send initialization complete notification
                        const initEvent = new CustomEvent('hostReady', {
                            detail: { ready: true, timestamp: new Date().toISOString() },
                            bubbles: true,
                            composed: true
                        });
                        if (learningProgramComponent) {
                            learningProgramComponent.dispatchEvent(initEvent);
                        }
                    }, 500);
                });
                
                lightningOutApp.addEventListener('lo.component.ready', (event) => {
                    addDebug('✅ lo.component.ready - Component ready', event.detail);
                });
                
                lightningOutApp.addEventListener('lo.application.error', (event) => {
                    addDebug('❌ lo.application.error', event.detail);
                    showError('Application error: ' + JSON.stringify(event.detail));
                });
                
                lightningOutApp.addEventListener('lo.component.error', (event) => {
                    addDebug('❌ lo.component.error', event.detail);
                });
                
                lightningOutApp.addEventListener('lo.iframe.error', (event) => {
                    addDebug('❌ lo.iframe.error', event.detail);
                });
                
                // Step 7: Append elements to DOM
                loContainer.appendChild(lightningOutApp);
                loContainer.appendChild(learningProgramComponent);
                
                addDebug('Elements appended to DOM');
                
                // Step 8: Set up host page button handlers
                sendMessageBtn.onclick = () => {
                    const message = `Hello from host at ${new Date().toLocaleTimeString()}`;
                    sendMessageToComponent(message);
                };
                
                triggerActionBtn.onclick = () => {
                    triggerComponentAction('refresh', { timestamp: new Date().toISOString() });
                };
                
                refreshBtn.onclick = () => {
                    triggerComponentAction('reload');
                    showHostMessage('Component refresh triggered');
                };
                
                // Timeout fallback
                setTimeout(() => {
                    if (loadingDiv.style.display !== 'none') {
                        const iframes = document.querySelectorAll('iframe');
                        if (iframes.length > 0) {
                            addDebug(`Found ${iframes.length} iframe(s) - hiding loading`);
                            loadingDiv.style.display = 'none';
                        } else {
                            addDebug('⚠️ No iframes found after timeout');
                            // Don't show error, just keep waiting
                        }
                    }
                }, 20000);
                
            } catch (error) {
                addDebug('❌ Initialization error', { message: error.message, stack: error.stack });
                showError(error.message);
            }
        }
        
        // Start the application
        addDebug('Starting Lightning Out 2.0 application...');
        init();
        
        // Manual retry
        window.retryLightning = () => location.reload();
    </script>
</body>
</html>
