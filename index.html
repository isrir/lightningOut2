<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Salesforce Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f3f3 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        #app-wrapper {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            min-height: 500px;
            position: relative;
        }

        #loading {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 14px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-container {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #c23934;
        }

        #error-container p { margin-bottom: 16px; font-size: 14px; }
        #error-container button {
            padding: 10px 24px;
            background: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        #error-container button:hover {
            background: #005fb2;
        }

        #lo-container {
            width: 100%;
            min-height: 400px;
            position: relative;
        }

        #debug-info {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            display: none;
            border-left: 3px solid #0070d2;
            max-height: 300px;
            overflow-y: auto;
        }

        #debug-info.show {
            display: block;
        }

        #debug-info strong {
            display: block;
            margin-bottom: 8px;
            color: #0070d2;
        }

        #debug-info pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 10px;
            line-height: 1.4;
        }

        /* Ensure any iframe becomes visible */
        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 400px !important;
            border: none !important;
            visibility: visible !important;
        }
        
        lightning-out-application {
            display: block;
            width: 100%;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading enrollment form…</div>
            <div style="font-size:12px;color:#888;margin-top:8px;">
                Connecting to Salesforce securely
            </div>
        </div>

        <div id="error-container">
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <div id="lo-container"></div>

        <div id="debug-info">
            <strong>🔍 Debug Information</strong>
            <pre id="debug-content"></pre>
        </div>
    </div>

    <!-- Salesforce Lightning Out Library -->
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js" onload="onLightningLibraryLoaded()" onerror="onLightningLibraryError()"></script>

    <script>
        // DOM Elements
        const loadingDiv = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const loContainer = document.getElementById('lo-container');
        const debugDiv = document.getElementById('debug-info');
        const debugContent = document.getElementById('debug-content');
        
        // State
        let debugMessages = [];
        let isLightningReady = false;
        let pendingInit = false;
        let iframeObserver = null;

        // Helper: Add debug message
        function addDebug(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            debugMessages.unshift({ timestamp, message, data });
            if (debugMessages.length > 30) debugMessages.pop();
            
            debugContent.textContent = debugMessages.map(m => 
                `[${m.timestamp}] ${m.message}${m.data ? '\n' + JSON.stringify(m.data, null, 2) : ''}`
            ).join('\n\n');
            
            if (!debugDiv.classList.contains('show')) {
                debugDiv.classList.add('show');
            }
            console.log(`[${timestamp}]`, message, data || '');
        }

        // Helper: Show error
        function showError(msg, details = null) {
            addDebug('❌ ERROR: ' + msg, details);
            loadingDiv.style.display = 'none';
            errorMessage.innerHTML = msg;
            errorContainer.style.display = 'block';
        }

        // Helper: Hide error
        function hideError() {
            errorContainer.style.display = 'none';
        }

        // Helper: Get frontdoor URL from API
        async function getFrontdoorUrl() {
            addDebug('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                addDebug(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                addDebug('API Response received', { 
                    hasFrontdoorUrl: !!data.frontdoorUrl,
                    urlLength: data.frontdoorUrl?.length || 0
                });
                
                if (!data.frontdoorUrl) {
                    throw new Error('No frontdoorUrl in API response');
                }
                
                return data.frontdoorUrl;
            } catch (error) {
                addDebug(`Failed to get frontdoor URL: ${error.message}`);
                throw error;
            }
        }

        // Function to monitor and fix iframe visibility
        function monitorIframes() {
            const iframes = document.querySelectorAll('iframe');
            const lightningElements = document.querySelectorAll('lightning-out-application');
            
            addDebug(`Monitor check - Iframes: ${iframes.length}, Lightning elements: ${lightningElements.length}`);
            
            if (iframes.length > 0) {
                addDebug(`🎯 Found ${iframes.length} iframe(s) - ensuring visibility`);
                iframes.forEach((iframe, idx) => {
                    iframe.style.display = 'block';
                    iframe.style.visibility = 'visible';
                    iframe.style.width = '100%';
                    iframe.style.minHeight = '400px';
                    iframe.style.border = 'none';
                    addDebug(`✅ Fixed iframe ${idx + 1} visibility`);
                });
                
                // Hide loading if iframes exist
                if (loadingDiv.style.display !== 'none') {
                    setTimeout(() => {
                        loadingDiv.style.display = 'none';
                        addDebug('Loading hidden - iframe(s) detected');
                    }, 500);
                }
                return true;
            }
            return false;
        }

        // Setup mutation observer to catch iframes when added
        function setupIframeObserver() {
            if (iframeObserver) return;
            
            iframeObserver = new MutationObserver((mutations) => {
                let hasNewIframes = false;
                
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeName === 'IFRAME') {
                                hasNewIframes = true;
                            } else if (node.querySelectorAll) {
                                const iframes = node.querySelectorAll('iframe');
                                if (iframes.length > 0) hasNewIframes = true;
                            }
                        });
                    }
                });
                
                if (hasNewIframes) {
                    addDebug('🔔 New iframe(s) detected via observer');
                    setTimeout(monitorIframes, 100);
                }
            });
            
            iframeObserver.observe(document.body, { childList: true, subtree: true });
            addDebug('Iframe observer started');
        }

        // Initialize using the custom element (most reliable)
        async function initWithCustomElement() {
            addDebug('🚀 Initializing with lightning-out-application element');
            
            try {
                // Clear container
                loContainer.innerHTML = '';
                
                // Get frontdoor URL
                const frontdoorUrl = await getFrontdoorUrl();
                addDebug(`Frontdoor URL obtained (length: ${frontdoorUrl.length})`);
                
                // Create custom element
                const loApp = document.createElement('lightning-out-application');
                loApp.id = 'loApp';
                loApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                loApp.setAttribute('components', 'c-learning-program-form');
                loApp.setAttribute('frontdoor-url', frontdoorUrl);
                loApp.style.width = '100%';
                loApp.style.minHeight = '400px';
                loApp.style.display = 'block';
                
                addDebug('Created lightning-out-application element', {
                    appId: '1UsdN00000025rdSAA',
                    components: 'c-learning-program-form'
                });
                
                // Set up event listeners
                let isReady = false;
                
                loApp.addEventListener('lo.application.ready', () => {
                    addDebug('✅ lo.application.ready - App loaded');
                    isReady = true;
                    setTimeout(() => {
                        monitorIframes();
                        if (loadingDiv.style.display !== 'none') {
                            setTimeout(() => {
                                loadingDiv.style.display = 'none';
                                addDebug('Loading hidden after app ready');
                            }, 1000);
                        }
                    }, 500);
                });
                
                loApp.addEventListener('lo.iframe.load', (event) => {
                    addDebug('📄 lo.iframe.load - Iframe loaded', { origin: event.detail });
                    setTimeout(monitorIframes, 100);
                });
                
                loApp.addEventListener('lo.component.ready', (event) => {
                    addDebug('✅ lo.component.ready - Component ready');
                    setTimeout(monitorIframes, 100);
                });
                
                loApp.addEventListener('lo.application.error', (event) => {
                    addDebug('❌ lo.application.error', event.detail);
                    if (!isReady) {
                        showError('Failed to load application: ' + JSON.stringify(event.detail));
                    }
                });
                
                loApp.addEventListener('lo.iframe.error', (event) => {
                    addDebug('❌ lo.iframe.error', event.detail);
                });
                
                loApp.addEventListener('lo.component.error', (event) => {
                    addDebug('❌ lo.component.error', event.detail);
                });
                
                // Append to DOM
                loContainer.appendChild(loApp);
                addDebug('Lightning Out element appended to DOM');
                
                // Set timeout for loading
                setTimeout(() => {
                    if (!isReady && loadingDiv.style.display !== 'none') {
                        const hasIframes = monitorIframes();
                        if (!hasIframes) {
                            addDebug('⚠️ Loading timeout - no iframes detected');
                            showError('Loading timed out. Please check:<br>• Component name is correct<br>• App ID is valid<br>• Component is exposed for Lightning Out');
                        }
                    }
                }, 30000);
                
                // Monitor periodically
                const monitorInterval = setInterval(() => {
                    const hasIframes = monitorIframes();
                    if (hasIframes && loadingDiv.style.display !== 'none') {
                        loadingDiv.style.display = 'none';
                        clearInterval(monitorInterval);
                    }
                }, 2000);
                
                // Clear interval after 30 seconds
                setTimeout(() => clearInterval(monitorInterval), 30000);
                
            } catch (error) {
                addDebug('❌ Custom element init error', { message: error.message, stack: error.stack });
                showError(error.message);
            }
        }
        
        // Callback when Lightning library loads
        function onLightningLibraryLoaded() {
            addDebug('✅ Lightning Out library loaded successfully');
            addDebug('Checking $Lightning object...', { 
                defined: typeof $Lightning !== 'undefined',
                use: typeof $Lightning?.use,
                createComponent: typeof $Lightning?.createComponent
            });
            isLightningReady = true;
            
            if (pendingInit) {
                addDebug('Starting pending initialization');
                initWithCustomElement();
            }
        }
        
        // Callback when Lightning library fails to load
        function onLightningLibraryError() {
            addDebug('❌ Failed to load Lightning Out library');
            showError('Failed to load Salesforce Lightning library. Please check your network connection.');
        }
        
        // Start the application
        function start() {
            addDebug('Starting application...');
            setupIframeObserver();
            
            // Check if Lightning library is already loaded
            if (typeof $Lightning !== 'undefined') {
                addDebug('Lightning library already loaded');
                isLightningReady = true;
                initWithCustomElement();
            } else {
                addDebug('Waiting for Lightning library to load...');
                pendingInit = true;
                
                // Fallback: if library doesn't load within 5 seconds, try anyway with custom element
                setTimeout(() => {
                    if (!isLightningReady) {
                        addDebug('⚠️ Library not loaded after 5 seconds, but custom element might still work');
                        // Custom element might still work even if $Lightning is not available
                        if (customElements.get('lightning-out-application')) {
                            addDebug('Custom element is registered, attempting initialization anyway');
                            initWithCustomElement();
                        }
                    }
                }, 5000);
            }
        }
        
        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', start);
        } else {
            start();
        }
        
        // Manual retry function
        window.retryLightning = function() {
            addDebug('Manual retry triggered');
            location.reload();
        };
    </script>
</body>
</html>
