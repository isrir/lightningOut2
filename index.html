<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        /* Minimal CSS for Lightning Out component visibility */
        lightning-out-application {
            display: block !important;
            width: 100% !important;
            min-height: 500px !important;
        }
        
        lightning-out-application iframe {
            width: 100% !important;
            min-height: 500px !important;
            border: none !important;
        }
    </style>
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
</head>
<body>
    <div id="loading">Loading enrollment form...</div>
    <div id="error-container" style="display:none; color:red; padding:20px;">
        <p id="error-message"></p>
        <button onclick="location.reload()">Retry</button>
    </div>
    
    <lightning-out-application
        id="loApplication"
        app-id="1UsdN00000025rdSAA"
        components="c-learning-program-form"
    ></lightning-out-application>

    <script>
        const loadingDiv = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const loApp = document.getElementById('loApplication');

        function showError(msg) {
            loadingDiv.style.display = 'none';
            errorMessage.textContent = msg;
            errorContainer.style.display = 'block';
        }

        function forceShowComponent() {
            if (loApp) {
                loApp.removeAttribute('style');
                loApp.style.display = 'block';
                const iframe = loApp.querySelector('iframe');
                if (iframe) {
                    iframe.style.display = 'block';
                }
            }
        }

        async function getFrontdoorUrl() {
            try {
                const response = await fetch('/api/guest-session');
                if (!response.ok) throw new Error('Guest session failed');
                const data = await response.json();
                if (!data.frontdoorUrl) throw new Error('No frontdoor URL');
                return data.frontdoorUrl;
            } catch (error) {
                throw new Error('Unable to authenticate: ' + error.message);
            }
        }

        async function init() {
            try {
                const frontdoorUrl = await getFrontdoorUrl();
                loApp.setAttribute('frontdoor-url', frontdoorUrl);
                
                loApp.addEventListener('lo.application.ready', () => {
                    loadingDiv.style.display = 'none';
                    forceShowComponent();
                });
                
                loApp.addEventListener('lo.application.error', (e) => {
                    showError(e.detail?.message || 'Lightning Out error');
                });
                
            } catch (error) {
                showError(error.message);
            }
        }
        
        init();
    </script>
</body>
</html>
