<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry Form</title>
  <!-- Add CSP meta tag to reduce warnings -->
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' *.salesforce.com https://lightning-out2.vercel.app">
  <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #status { padding: 10px; margin: 10px 0; background: #f0f0f0; border-radius: 5px; }
    #error { color: red; padding: 10px; display: none; background: #ffe0e0; border-radius: 5px; }
    .loading { color: blue; }
    .success { color: green; }
  </style>
</head>
<body>

<div id="status">Initializing...</div>
<div id="error"></div>

<lightning-out-application
  app-id="1UsdN00000025rdSAA"
  components="c-learning-program-form"
></lightning-out-application>

<script>
// Utility functions
function showStatus(message, isError = false) {
  const statusDiv = document.getElementById('status');
  const errorDiv = document.getElementById('error');
  if (isError) {
    errorDiv.style.display = 'block';
    errorDiv.innerHTML = message;
    statusDiv.innerHTML = 'Error occurred';
    statusDiv.className = '';
  } else {
    statusDiv.innerHTML = message;
    statusDiv.className = 'loading';
    errorDiv.style.display = 'none';
  }
  console.log(message);
}

// Generate PKCE code verifier and challenge
function generateCodeVerifier() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  return btoa(String.fromCharCode(...array))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

async function generateCodeChallenge(verifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-')
    .replace(/\//g, '_')
    .replace(/=+$/, '');
}

async function initLightningOut() {
  try {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const redirectUri = window.location.origin + '/';
    
    // If no code, redirect to Salesforce login
    if (!code) {
      showStatus('Redirecting to Salesforce login...');
      
      const codeVerifier = generateCodeVerifier();
      const codeChallenge = await generateCodeChallenge(codeVerifier);
      
      // Store verifier for later
      sessionStorage.setItem('pkce_code_verifier', codeVerifier);
      
      const clientId = '3MVG9GBhY6wQjl2uGwI77CbrWiUlVtg4LnMmf3oNCsQWxBFyRqGqfTuBMKo9spG0P8MiVkIcMLWnHt0nux63e';
      
      // Build authorization URL
      const authUrl = new URL('https://creationtechnology4.my.salesforce.com/services/oauth2/authorize');
      authUrl.searchParams.append('response_type', 'code');
      authUrl.searchParams.append('client_id', clientId);
      authUrl.searchParams.append('redirect_uri', redirectUri);
      authUrl.searchParams.append('scope', 'web api');
      authUrl.searchParams.append('code_challenge', codeChallenge);
      authUrl.searchParams.append('code_challenge_method', 'S256');
      
      console.log('Redirecting to:', authUrl.toString());
      window.location.href = authUrl.toString();
      return;
    }
    
    // We have a code, exchange it for tokens
    showStatus('Exchanging authorization code for tokens...');
    
    const codeVerifier = sessionStorage.getItem('pkce_code_verifier');
    
    const tokenResponse = await fetch('/api/exchange-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        code, 
        redirectUri,
        codeVerifier: codeVerifier
      })
    });
    
    if (!tokenResponse.ok) {
      const error = await tokenResponse.json();
      throw new Error(`Token exchange failed: ${JSON.stringify(error)}`);
    }
    
    const { accessToken, instanceUrl } = await tokenResponse.json();
    console.log('Token received successfully');
    showStatus('Getting Lightning Out session...');
    
    // Get frontdoor URL
    const frontdoorResponse = await fetch('/api/frontdoor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ accessToken, instanceUrl })
    });
    
    if (!frontdoorResponse.ok) {
      const error = await frontdoorResponse.json();
      throw new Error(`Frontdoor request failed: ${JSON.stringify(error)}`);
    }
    
    const { frontdoorUrl } = await frontdoorResponse.json();
    console.log('Frontdoor URL received');
    
    // Initialize Lightning Out
    const app = document.querySelector('lightning-out-application');
    app.setAttribute('frontdoor-url', frontdoorUrl);
    
    showStatus('Loading Salesforce component...', false);
    
    // Add event listeners for Lightning Out
    app.addEventListener('lo.application.ready', () => {
      showStatus('✅ Component loaded successfully!', false);
      const statusDiv = document.getElementById('status');
      statusDiv.className = 'success';
    });
    
    app.addEventListener('lo.application.error', (e) => {
      console.error('LO2 error:', e.detail);
      showStatus(`❌ Component error: ${e.detail?.message || 'unknown'}`, true);
    });
    
  } catch (error) {
    console.error('Initialization error:', error);
    showStatus(`❌ Error: ${error.message}`, true);
  }
}

// Start the app
initLightningOut();
</script>

</body>
</html>
