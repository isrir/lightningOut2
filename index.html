<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Salesforce Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .header h1 {
            color: #0070d2;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        /* Component container — NO fixed height, grows with content */
        .component-wrapper {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            position: relative;
            /* KEY FIX: do NOT set min-height or overflow here */
            height: auto;
            overflow: visible;
        }

        .component-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #0070d2;
        }

        /* Footer */
        .footer {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            min-height: 200px;
            background: rgba(255,255,255,0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 12px;
            z-index: 10;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-loading { background: #fff3e0; color: #e6a700; }
        .status-ready   { background: #e8f5e9; color: #2e7d32; }
        .status-error   { background: #ffebee; color: #c62828; }

        /* ─── KEY FIXES FOR LIGHTNING OUT HEIGHT ─────────────────────────── */

        /* Let the LWC application element grow with its content */
        lightning-out-application {
            display: block;
            width: 100%;
            height: auto !important;
            min-height: auto !important;
            overflow: visible !important;
        }

        /* Let the iframe size itself to its content — JS will set explicit px height */
        iframe {
            display: block !important;
            width: 100% !important;
            height: auto !important;
            min-height: auto !important;
            border: none !important;
            overflow: hidden !important;
        }

        /* The custom element wrapper — no fixed height */
        c-learning-program-form {
            display: block;
            width: 100%;
            height: auto !important;
            min-height: auto !important;
            overflow: visible !important;
            /* SLDS token overrides to prevent internal scrolling */
            --slds-c-card-sizing-height: auto;
        }
        /* ─────────────────────────────────────────────────────────────────── */
    </style>
</head>
<body>
    <div class="container">
        <!-- Component Container -->
        <div class="component-wrapper">
            <div class="component-title">🎓 Enrollment Form</div>

            <!-- Loading overlay — shown until lo.application.ready fires -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="spinner"></div>
                <div>Loading enrollment form…</div>
                <div style="font-size: 12px; color: #888; margin-top: 8px;">Establishing secure connection</div>
            </div>

            <!-- Lightning Out library -->
            <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

            <!-- Lightning Out application wrapper -->
            <lightning-out-application
                id="loApp"
                app-id="1UsdN00000025rdSAA"
                components="c-learning-program-form">
            </lightning-out-application>

            <!-- Your LWC component -->
            <c-learning-program-form
                id="learningProgramComponent"
                style="
                    --slds-c-card-color-background: #ffffff;
                    --slds-c-card-text-color: #1a1a1a;
                    --slds-c-card-color-border: #0070d2;
                    --custom-primary-color: #0070d2;
                    --slds-c-card-sizing-height: auto;
                    display: block;
                    height: auto;
                    min-height: auto;
                    overflow: visible;
                ">
            </c-learning-program-form>
        </div>

        <!-- Footer -->
        <div class="footer">
            &copy; 2025 Creation Technology &mdash; Powered by Salesforce Lightning
        </div>

    </div>

    <script>
        const loApp            = document.getElementById('loApp');
        const component        = document.getElementById('learningProgramComponent');
        const loadingOverlay   = document.getElementById('loadingOverlay');
        const statusBadge      = document.getElementById('statusBadge');

        /* ── helpers ──────────────────────────────────────────────────── */

        function updateStatus(status, text) {
            if (!statusBadge) return;
            statusBadge.className = `status-badge status-${status}`;
            statusBadge.innerHTML = text;
        }

        function showError(msg) {
            updateStatus('error', '❌ Connection Error');
            if (loadingOverlay) {
                loadingOverlay.innerHTML = `
                    <div style="color:#c23934;text-align:center;">
                        <div style="font-size:24px;margin-bottom:12px;">⚠️</div>
                        <div>${msg}</div>
                        <div style="font-size:12px;margin-top:8px;">Please check your connection and try again.</div>
                        <button onclick="location.reload()"
                            style="margin-top:16px;padding:8px 24px;background:#0070d2;
                                   color:white;border:none;border-radius:4px;cursor:pointer;">
                            Retry
                        </button>
                    </div>`;
            }
        }

        /* ── iframe auto-height ───────────────────────────────────────── */
        /*
         * Lightning Out renders your LWC inside a sandboxed <iframe>.
         * The iframe does NOT auto-resize to its content — we must measure
         * the inner document's scrollHeight and apply it as an explicit
         * pixel height. We do this:
         *   1. Once immediately after lo.application.ready
         *   2. Via a ResizeObserver on the inner body (catches dynamic changes)
         *   3. Via a short polling fallback for same-origin iframes
         */
        function autoSizeIframe(iframe) {
            if (!iframe) return;

            function applyHeight() {
                try {
                    const doc = iframe.contentDocument || iframe.contentWindow?.document;
                    if (!doc || !doc.body) return;

                    // Remove any overflow:hidden/auto on the inner body so scrollHeight is real
                    doc.body.style.overflow  = 'visible';
                    doc.documentElement.style.overflow = 'visible';

                    const h = doc.body.scrollHeight || doc.documentElement.scrollHeight;
                    if (h && h > 0) {
                        iframe.style.height = h + 'px';
                    }
                } catch (e) {
                    // Cross-origin: can't read contentDocument — fall back to a generous fixed height
                    // Set a tall enough height so the full form is visible
                    iframe.style.height = '600px';
                }
            }

            // Immediate attempt
            applyHeight();

            // Retry after first paint
            setTimeout(applyHeight, 300);
            setTimeout(applyHeight, 800);
            setTimeout(applyHeight, 1500);

            // ResizeObserver on iframe element itself (catches layout shifts)
            if (window.ResizeObserver) {
                const ro = new ResizeObserver(() => applyHeight());
                ro.observe(iframe);
            }

            // Also try observing the inner body if accessible (same-origin)
            try {
                const doc = iframe.contentDocument || iframe.contentWindow?.document;
                if (doc && doc.body && window.ResizeObserver) {
                    const innerRo = new ResizeObserver(() => applyHeight());
                    innerRo.observe(doc.body);
                }
            } catch (e) { /* cross-origin, skip */ }
        }

        /* ── shadow DOM style injection ──────────────────────────────── */
        /*
         * We can't target shadow root CSS from outside, but we CAN inject
         * a <style> tag into the shadow root after the component renders.
         * This removes the fixed min-height on .lp-form inside the LWC.
         */
        function patchShadowStyles() {
            try {
                const host = document.querySelector('c-learning-program-form');
                if (!host || !host.shadowRoot) return;

                // Check if already patched
                if (host.shadowRoot.querySelector('#lp-height-patch')) return;

                const style = document.createElement('style');
                style.id = 'lp-height-patch';
                style.textContent = `
                    .lp-form {
                        min-height: auto !important;
                        height: auto !important;
                        overflow: visible !important;
                        padding-bottom: 1.5rem !important;
                    }
                    .lp-textarea {
                        min-height: 120px !important;
                        height: auto !important;
                    }
                `;
                host.shadowRoot.appendChild(style);
                console.log('✅ Shadow DOM styles patched');
            } catch (e) {
                console.warn('Shadow DOM patch skipped:', e.message);
            }
        }

        /* ── get frontdoor URL from backend ──────────────────────────── */
        async function getFrontdoorUrl() {
            const response = await fetch('/api/guest-session');
            if (!response.ok) throw new Error(`Backend returned ${response.status}`);
            const data = await response.json();
            return data.frontdoorUrl;
        }

        /* ── main init ────────────────────────────────────────────────── */
        async function init() {
            try {
                const frontdoorUrl = await getFrontdoorUrl();
                loApp.setAttribute('frontdoor-url', frontdoorUrl);
                console.log('Frontdoor URL set, waiting for Lightning Out…');

                /* application ready — hide loader, size iframe */
                loApp.addEventListener('lo.application.ready', () => {
                    console.log('✅ lo.application.ready');
                    updateStatus('ready', '✅ Connected');
                    if (loadingOverlay) loadingOverlay.style.display = 'none';

                    // Find and auto-size the iframe Lightning Out created
                    const iframe = loApp.querySelector('iframe');
                    autoSizeIframe(iframe);

                    // Patch shadow DOM height styles after a short delay
                    setTimeout(patchShadowStyles, 400);
                    setTimeout(patchShadowStyles, 1000);
                });

                /* iframe loaded (fires before ready in some versions) */
                loApp.addEventListener('lo.iframe.load', (event) => {
                    console.log('✅ lo.iframe.load:', event.detail);
                    if (loadingOverlay) loadingOverlay.style.display = 'none';

                    const iframe = loApp.querySelector('iframe');
                    autoSizeIframe(iframe);
                });

                /* component ready */
                loApp.addEventListener('lo.component.ready', () => {
                    console.log('✅ lo.component.ready');
                    const iframe = loApp.querySelector('iframe');
                    autoSizeIframe(iframe);
                    setTimeout(patchShadowStyles, 200);
                });

                /* error */
                loApp.addEventListener('lo.application.error', (event) => {
                    console.error('❌ lo.application.error:', event.detail);
                    showError('Failed to load enrollment form.');
                });

                /* form events from the LWC */
                if (component) {
                    component.addEventListener('formSubmitted', (event) => {
                        console.log('Form submitted:', event.detail);
                        alert('Enrollment submitted successfully!');
                    });

                    component.addEventListener('formError', (event) => {
                        console.error('Form error:', event.detail);
                    });
                }

            } catch (error) {
                console.error('Initialization error:', error);
                showError(`Failed to connect to Salesforce: ${error.message}`);
            }
        }

        /* ── wait for custom element registration, then init ─────────── */
        if (customElements.get('lightning-out-application')) {
            init();
        } else {
            const checkInterval = setInterval(() => {
                if (customElements.get('lightning-out-application')) {
                    clearInterval(checkInterval);
                    init();
                }
            }, 100);

            // Timeout after 15 s if the script never loads
            setTimeout(() => {
                clearInterval(checkInterval);
                if (!customElements.get('lightning-out-application')) {
                    showError('Lightning Out script failed to load. Check your Salesforce org URL.');
                }
            }, 15000);
        }
    </script>
</body>
</html>
