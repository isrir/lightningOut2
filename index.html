<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lightning Out 2.0 - Test Component</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            background: #f5f7fa;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #0070d2;
            margin-bottom: 20px;
        }
        
        lightning-out-application {
            display: block;
            width: 100%;
            min-height: 400px;
        }
        
        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 400px !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Salesforce Component Test</h1>
        
        <!-- Lightning Out Library -->
        <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
        
        <!-- App Wrapper -->
        <lightning-out-application 
            app-id="1UsdN00000025rdSAA" 
            components="c-dd">
        </lightning-out-application>
        
        <!-- Your Component -->
        <c-dd></c-dd>
    </div>
    
    <script>
        // Optional: Monitor loading status
        const app = document.querySelector('lightning-out-application');
        
        app.addEventListener('lo.application.ready', () => {
            console.log('✅ App ready - component loaded');
        });
        
        app.addEventListener('lo.iframe.load', (e) => {
            console.log('✅ Iframe loaded from:', e.detail);
        });
        
        app.addEventListener('lo.application.error', (e) => {
            console.error('❌ App error:', e.detail);
        });
    </script>
</body>
</html>
