<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Lightning Out 2.0 - Learning Program Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Salesforce Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #0070d2;
        }

        .header h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .status-loading {
            background: #fff3e0;
            color: #e6a700;
        }

        .status-ready {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-error {
            background: #ffebee;
            color: #c62828;
        }

        /* Component Container */
        .component-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .component-container h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a1a1a;
            border-bottom: 2px solid #0070d2;
            padding-bottom: 8px;
            display: inline-block;
        }

        #lo-container {
            min-height: 500px;
            position: relative;
        }

        /* Loading Spinner */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            border-radius: 8px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0;
            }
            
            .header, .component-container {
                padding: 16px;
            }
        }

        /* Lightning Out Required Styles */
        lightning-out-application {
            display: block;
            width: 100%;
            min-height: 500px;
        }

        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 500px !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📚 Learning Program Enrollment</h1>
            <p>Powered by Salesforce Lightning Out 2.0</p>
            <div id="statusBadge" class="status-badge status-loading">🔄 Loading...</div>
        </div>

        <!-- Component Container -->
        <div class="component-container">
            <h2>Salesforce Component</h2>
            <div id="lo-container" style="position: relative;">
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="spinner"></div>
                    <div>Connecting to Salesforce...</div>
                    <div style="font-size: 12px; color: #888; margin-top: 8px;">Establishing secure connection</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Salesforce Lightning Out Library -->
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

    <script>
        // DOM Elements
        const loContainer = document.getElementById('lo-container');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusBadge = document.getElementById('statusBadge');
        
        // State
        let lightningOutApp = null;
        let component = null;

        // Helper: Update status badge
        function updateStatus(status, text) {
            statusBadge.className = `status-badge status-${status}`;
            statusBadge.innerHTML = text;
        }

        // Helper: Get frontdoor URL from API
        async function getFrontdoorUrl() {
            console.log('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                console.log(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                console.log('API Response received');
                
                if (!data.frontdoorUrl) {
                    throw new Error('No frontdoorUrl in API response');
                }
                
                return data.frontdoorUrl;
            } catch (error) {
                console.error(`Failed to get frontdoor URL: ${error.message}`);
                throw error;
            }
        }

        // Force iframe visibility
        function fixIframeVisibility() {
            setTimeout(() => {
                if (lightningOutApp && lightningOutApp.shadowRoot) {
                    const iframe = lightningOutApp.shadowRoot.querySelector('iframe');
                    if (iframe) {
                        iframe.style.display = 'block';
                        iframe.style.width = '100%';
                        iframe.style.minHeight = '500px';
                        iframe.style.visibility = 'visible';
                        console.log('Iframe visibility fixed');
                    }
                }
            }, 100);
        }

        // Main initialization
        async function init() {
            console.log('Initializing Lightning Out 2.0 Application');
            
            try {
                // Clear container
                loContainer.innerHTML = '';
                
                // Get frontdoor URL
                const frontdoorUrl = await getFrontdoorUrl();
                console.log('Frontdoor URL obtained');
                
                // Create lightning-out-application element
                lightningOutApp = document.createElement('lightning-out-application');
                lightningOutApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                lightningOutApp.setAttribute('components', 'c-learning-program-form');
                lightningOutApp.setAttribute('frontdoor-url', frontdoorUrl);
                lightningOutApp.style.display = 'block';
                lightningOutApp.style.width = '100%';
                lightningOutApp.style.minHeight = '500px';
                
                console.log('Created lightning-out-application element');
                
                // Create component element
                component = document.createElement('c-learning-program-form');
                component.setAttribute('style', `
                    --slds-c-card-color-background: #ffffff;
                    --slds-c-card-text-color: #1a1a1a;
                    --slds-c-card-color-border: #0070d2;
                `);
                
                console.log('Created c-learning-program-form component');
                
                // Set up app event listeners
                lightningOutApp.addEventListener('lo.application.ready', () => {
                    console.log('Application ready');
                    updateStatus('ready', '✅ Connected');
                    loadingOverlay.style.display = 'none';
                    fixIframeVisibility();
                });
                
                lightningOutApp.addEventListener('lo.iframe.load', (event) => {
                    console.log(`Iframe loaded from ${event.detail}`);
                    loadingOverlay.style.display = 'none';
                    fixIframeVisibility();
                });
                
                lightningOutApp.addEventListener('lo.component.ready', () => {
                    console.log('Component instance ready');
                });
                
                lightningOutApp.addEventListener('lo.application.error', (event) => {
                    console.error(`Application error: ${JSON.stringify(event.detail)}`);
                    updateStatus('error', '❌ Error');
                    loadingOverlay.innerHTML = `
                        <div style="color: #c23934; text-align: center;">
                            <div style="font-size: 24px; margin-bottom: 12px;">⚠️</div>
                            <div>Failed to load component</div>
                            <div style="font-size: 12px; margin-top: 8px;">Application error</div>
                            <button onclick="location.reload()" style="margin-top: 16px; padding: 8px 16px; background: #0070d2; color: white; border: none; border-radius: 4px; cursor: pointer;">Retry</button>
                        </div>
                    `;
                });
                
                lightningOutApp.addEventListener('lo.component.error', (event) => {
                    console.error(`Component error: ${JSON.stringify(event.detail)}`);
                });
                
                lightningOutApp.addEventListener('lo.iframe.error', (event) => {
                    console.error(`Iframe error: ${JSON.stringify(event.detail)}`);
                    updateStatus('error', '❌ Connection Error');
                });
                
                // Append to DOM in correct order
                loContainer.appendChild(lightningOutApp);
                lightningOutApp.appendChild(component);
                
                console.log('Components added to DOM');
                
                // Periodic iframe visibility check
                setInterval(fixIframeVisibility, 2000);
                
            } catch (error) {
                console.error(`Initialization error: ${error.message}`);
                updateStatus('error', '❌ Failed');
                loadingOverlay.innerHTML = `
                    <div style="color: #c23934; text-align: center;">
                        <div style="font-size: 24px; margin-bottom: 12px;">⚠️</div>
                        <div>Failed to load component</div>
                        <div style="font-size: 12px; margin-top: 8px;">${error.message}</div>
                        <button onclick="location.reload()" style="margin-top: 16px; padding: 8px 16px; background: #0070d2; color: white; border: none; border-radius: 4px; cursor: pointer;">Retry</button>
                    </div>
                `;
            }
        }
        
        // Start application
        async function start() {
            console.log('Starting Lightning Out 2.0 application...');
            
            // Wait for custom element registration
            if (customElements.get('lightning-out-application')) {
                console.log('Custom element already registered');
                await init();
            } else {
                console.log('Waiting for custom element registration...');
                await new Promise(resolve => {
                    const checkInterval = setInterval(() => {
                        if (customElements.get('lightning-out-application')) {
                            clearInterval(checkInterval);
                            console.log('Custom element registered');
                            resolve();
                        }
                    }, 100);
                });
                await init();
            }
        }
        
        start();
    </script>
</body>
</html>
