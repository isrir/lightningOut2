<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Lightning Out 2.0 - Learning Program Form</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Salesforce Sans', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8edf2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Styles */
        .header {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-left: 4px solid #0070d2;
        }

        .header h1 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
        }

        .status-loading {
            background: #fff3e0;
            color: #e6a700;
        }

        .status-ready {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-error {
            background: #ffebee;
            color: #c62828;
        }

        /* Component Container */
        .component-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .component-container h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #1a1a1a;
            border-bottom: 2px solid #0070d2;
            padding-bottom: 8px;
            display: inline-block;
        }

        #lo-container {
            min-height: 500px;
            position: relative;
        }

        /* Loading Spinner */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 10;
            border-radius: 8px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Controls Panel */
        .controls-panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .controls-panel h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #0070d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #005fb2;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        button.danger {
            background: #c23934;
        }

        button.danger:hover:not(:disabled) {
            background: #a12b27;
        }

        button.success {
            background: #2e844a;
        }

        button.success:hover:not(:disabled) {
            background: #1e6b3a;
        }

        /* Message Area */
        .message-area {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            display: none;
            border-left: 3px solid #0070d2;
        }

        .message-area.show {
            display: block;
        }

        .message-area.error {
            border-left-color: #c23934;
            background: #ffebee;
        }

        .message-area.success {
            border-left-color: #2e844a;
            background: #e8f5e9;
        }

        .message-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .message-content {
            font-size: 13px;
            color: #555;
            word-break: break-word;
        }

        /* Debug Panel */
        .debug-panel {
            background: #1a1a1a;
            color: #00ff00;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            max-height: 300px;
            overflow-y: auto;
        }

        .debug-panel h4 {
            color: #fff;
            margin-bottom: 12px;
            font-size: 12px;
        }

        .debug-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0;
            }
            
            .header, .component-container, .controls-panel {
                padding: 16px;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }

        /* Lightning Out Required Styles */
        lightning-out-application {
            display: block;
            width: 100%;
            min-height: 500px;
        }

        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 500px !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📚 Learning Program Enrollment</h1>
            <p>Powered by Salesforce Lightning Out 2.0</p>
            <div id="statusBadge" class="status-badge status-loading">🔄 Loading...</div>
        </div>

        <!-- Component Container -->
        <div class="component-container">
            <h2>Salesforce Component</h2>
            <div id="lo-container" style="position: relative;">
                <div id="loadingOverlay" class="loading-overlay">
                    <div class="spinner"></div>
                    <div>Connecting to Salesforce...</div>
                    <div style="font-size: 12px; color: #888; margin-top: 8px;">Establishing secure connection</div>
                </div>
            </div>
        </div>

        <!-- Controls Panel -->
        <div class="controls-panel">
            <h3>🎮 Host Page Controls</h3>
            <div class="button-group">
                <button id="sendMessageBtn" disabled>📨 Send Test Message</button>
                <button id="refreshBtn" disabled>🔄 Refresh Component</button>
                <button id="getDataBtn" disabled>📊 Request Data</button>
                <button id="clearLogsBtn" class="danger">🗑️ Clear Logs</button>
            </div>
            
            <!-- Message Display -->
            <div id="messageArea" class="message-area">
                <div class="message-title">📬 Component Message</div>
                <div id="messageContent" class="message-content"></div>
            </div>
        </div>

        <!-- Debug Panel -->
        <div class="debug-panel">
            <h4>🔍 Debug Information</h4>
            <div id="debugContent" class="debug-content">Initializing...</div>
        </div>
    </div>

    <!-- Salesforce Lightning Out Library -->
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

    <script>
        // DOM Elements
        const loContainer = document.getElementById('lo-container');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const statusBadge = document.getElementById('statusBadge');
        const debugContent = document.getElementById('debugContent');
        const messageArea = document.getElementById('messageArea');
        const messageContent = document.getElementById('messageContent');
        const sendMessageBtn = document.getElementById('sendMessageBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const getDataBtn = document.getElementById('getDataBtn');
        const clearLogsBtn = document.getElementById('clearLogsBtn');
        
        // State
        let debugMessages = [];
        let lightningOutApp = null;
        let component = null;
        let isReady = false;

        // Helper: Add debug message
        function addDebug(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : '📝';
            debugMessages.unshift(`[${timestamp}] ${icon} ${message}`);
            if (debugMessages.length > 50) debugMessages.pop();
            debugContent.innerHTML = debugMessages.join('\n');
            console.log(`[${timestamp}]`, message);
        }

        // Helper: Show message
        function showMessage(message, isError = false) {
            messageContent.innerHTML = `
                <strong>${new Date().toLocaleTimeString()}:</strong><br>
                ${message}
            `;
            messageArea.classList.add('show');
            if (isError) {
                messageArea.classList.add('error');
            } else {
                messageArea.classList.remove('error');
            }
            setTimeout(() => {
                messageArea.classList.remove('show');
            }, 5000);
        }

        // Helper: Update status badge
        function updateStatus(status, text) {
            statusBadge.className = `status-badge status-${status}`;
            statusBadge.innerHTML = text;
        }

        // Helper: Enable/disable controls
        function setControlsEnabled(enabled) {
            sendMessageBtn.disabled = !enabled;
            refreshBtn.disabled = !enabled;
            getDataBtn.disabled = !enabled;
        }

        // Helper: Get frontdoor URL from API
        async function getFrontdoorUrl() {
            addDebug('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                addDebug(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                addDebug('API Response received', 'success');
                
                if (!data.frontdoorUrl) {
                    throw new Error('No frontdoorUrl in API response');
                }
                
                return data.frontdoorUrl;
            } catch (error) {
                addDebug(`Failed to get frontdoor URL: ${error.message}`, 'error');
                throw error;
            }
        }

        // Send message to component
        function sendMessage() {
            if (!component) {
                showMessage('Component not loaded yet', true);
                return;
            }
            
            const message = `Hello from host page at ${new Date().toLocaleTimeString()}`;
            addDebug(`Sending message to component: ${message}`);
            
            const event = new CustomEvent('hostMessage', {
                detail: {
                    message: message,
                    timestamp: new Date().toISOString(),
                    source: 'host-page'
                },
                bubbles: true,
                composed: true
            });
            
            component.dispatchEvent(event);
            showMessage(`Message sent: "${message}"`);
        }

        // Refresh component
        function refreshComponent() {
            if (!component) {
                showMessage('Component not loaded yet', true);
                return;
            }
            
            addDebug('Sending refresh request to component');
            
            const event = new CustomEvent('refresh', {
                detail: {
                    timestamp: new Date().toISOString(),
                    source: 'host-page'
                },
                bubbles: true,
                composed: true
            });
            
            component.dispatchEvent(event);
            showMessage('Refresh request sent to component');
        }

        // Request data from component
        function requestData() {
            if (!component) {
                showMessage('Component not loaded yet', true);
                return;
            }
            
            addDebug('Requesting data from component');
            
            const event = new CustomEvent('requestData', {
                detail: {
                    requestId: Date.now().toString(),
                    timestamp: new Date().toISOString()
                },
                bubbles: true,
                composed: true
            });
            
            component.dispatchEvent(event);
            showMessage('Data request sent to component');
        }

        // Force iframe visibility
        function fixIframeVisibility() {
            setTimeout(() => {
                if (lightningOutApp && lightningOutApp.shadowRoot) {
                    const iframe = lightningOutApp.shadowRoot.querySelector('iframe');
                    if (iframe) {
                        iframe.style.display = 'block';
                        iframe.style.width = '100%';
                        iframe.style.minHeight = '500px';
                        iframe.style.visibility = 'visible';
                        addDebug('Iframe visibility fixed');
                    }
                }
            }, 100);
        }

        // Main initialization
        async function init() {
            addDebug('Initializing Lightning Out 2.0 Application');
            
            try {
                // Clear container
                loContainer.innerHTML = '';
                
                // Get frontdoor URL
                const frontdoorUrl = await getFrontdoorUrl();
                addDebug('Frontdoor URL obtained', 'success');
                
                // Create lightning-out-application element
                lightningOutApp = document.createElement('lightning-out-application');
                lightningOutApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                lightningOutApp.setAttribute('components', 'c-learning-program-form');
                lightningOutApp.setAttribute('frontdoor-url', frontdoorUrl);
                lightningOutApp.style.display = 'block';
                lightningOutApp.style.width = '100%';
                lightningOutApp.style.minHeight = '500px';
                
                addDebug('Created lightning-out-application element');
                
                // Create component element
                component = document.createElement('c-learning-program-form');
                component.setAttribute('style', `
                    --slds-c-card-color-background: #ffffff;
                    --slds-c-card-text-color: #1a1a1a;
                    --slds-c-card-color-border: #0070d2;
                `);
                
                addDebug('Created c-learning-program-form component');
                
                // Set up component event listeners
                component.addEventListener('componentReady', (event) => {
                    addDebug('Component ready event received', 'success');
                    showMessage('Component is ready!');
                });
                
                component.addEventListener('formSubmitted', (event) => {
                    addDebug(`Form submitted: ${JSON.stringify(event.detail)}`, 'success');
                    showMessage(`Form submitted successfully!`);
                });
                
                component.addEventListener('formError', (event) => {
                    addDebug(`Form error: ${JSON.stringify(event.detail)}`, 'error');
                    showMessage(`Error: ${event.detail?.message}`, true);
                });
                
                component.addEventListener('dataLoaded', (event) => {
                    addDebug(`Data loaded: ${JSON.stringify(event.detail)}`, 'success');
                });
                
                // Set up app event listeners
                lightningOutApp.addEventListener('lo.application.ready', () => {
                    addDebug('Application ready', 'success');
                    updateStatus('ready', '✅ Connected');
                    loadingOverlay.style.display = 'none';
                    setControlsEnabled(true);
                    fixIframeVisibility();
                });
                
                lightningOutApp.addEventListener('lo.iframe.load', (event) => {
                    addDebug(`Iframe loaded from ${event.detail}`, 'success');
                    loadingOverlay.style.display = 'none';
                    fixIframeVisibility();
                });
                
                lightningOutApp.addEventListener('lo.component.ready', () => {
                    addDebug('Component instance ready', 'success');
                });
                
                lightningOutApp.addEventListener('lo.application.error', (event) => {
                    addDebug(`Application error: ${JSON.stringify(event.detail)}`, 'error');
                    updateStatus('error', '❌ Error');
                    showMessage(`Application error: ${JSON.stringify(event.detail)}`, true);
                });
                
                lightningOutApp.addEventListener('lo.component.error', (event) => {
                    addDebug(`Component error: ${JSON.stringify(event.detail)}`, 'error');
                });
                
                lightningOutApp.addEventListener('lo.iframe.error', (event) => {
                    addDebug(`Iframe error: ${JSON.stringify(event.detail)}`, 'error');
                    updateStatus('error', '❌ Connection Error');
                });
                
                // Append to DOM in correct order
                loContainer.appendChild(lightningOutApp);
                lightningOutApp.appendChild(component);
                
                addDebug('Components added to DOM');
                
                // Set up button handlers
                sendMessageBtn.onclick = sendMessage;
                refreshBtn.onclick = refreshComponent;
                getDataBtn.onclick = requestData;
                clearLogsBtn.onclick = () => {
                    debugMessages = [];
                    debugContent.innerHTML = 'Logs cleared.';
                    addDebug('Logs cleared');
                };
                
                // Periodic iframe visibility check
                setInterval(fixIframeVisibility, 2000);
                
            } catch (error) {
                addDebug(`Initialization error: ${error.message}`, 'error');
                updateStatus('error', '❌ Failed');
                loadingOverlay.innerHTML = `
                    <div style="color: #c23934; text-align: center;">
                        <div style="font-size: 24px; margin-bottom: 12px;">⚠️</div>
                        <div>Failed to load component</div>
                        <div style="font-size: 12px; margin-top: 8px;">${error.message}</div>
                        <button onclick="location.reload()" style="margin-top: 16px;">Retry</button>
                    </div>
                `;
            }
        }
        
        // Start application
        async function start() {
            addDebug('Starting Lightning Out 2.0 application...');
            
            // Wait for custom element registration
            if (customElements.get('lightning-out-application')) {
                addDebug('Custom element already registered');
                await init();
            } else {
                addDebug('Waiting for custom element registration...');
                await new Promise(resolve => {
                    const checkInterval = setInterval(() => {
                        if (customElements.get('lightning-out-application')) {
                            clearInterval(checkInterval);
                            addDebug('Custom element registered');
                            resolve();
                        }
                    }, 100);
                });
                await init();
            }
        }
        
        start();
    </script>
</body>
</html>
