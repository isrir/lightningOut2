<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment Form - Learning Program</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
            min-height: 500px;
            position: relative;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: none;
            min-width: 300px;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #dc2626;
            margin-bottom: 10px;
        }

        .error-message {
            color: #6b7280;
            margin-bottom: 20px;
            word-break: break-word;
        }

        .error-details {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            font-family: monospace;
            margin-bottom: 20px;
            text-align: left;
            max-height: 200px;
            overflow: auto;
        }

        .retry-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .retry-btn:hover {
            background: #5a67d8;
        }

        lightning-out-application {
            display: block;
            min-height: 500px;
        }

        lightning-out-application:not([frontdoor-url]) {
            visibility: hidden;
        }
    </style>
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Learning Program Enrollment</h1>
            <p>Please fill out the form below to enroll in our learning program</p>
        </div>
        <div class="form-container">
            <div id="loading">
                <div class="spinner"></div>
                <p>Loading enrollment form...</p>
            </div>
            <div id="error-container">
                <div class="error-icon">⚠️</div>
                <div class="error-title">Unable to Load Form</div>
                <div class="error-message" id="error-message"></div>
                <div class="error-details" id="error-details" style="display:none;"></div>
                <button class="retry-btn" onclick="location.reload()">Try Again</button>
            </div>
            <lightning-out-application
                app-id="1UsdN00000025rdSAA"
                components="c-learning-program-form"
            ></lightning-out-application>
        </div>
    </div>

    <script>
        async function initGuestLightningOut() {
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            const errorDetails = document.getElementById('error-details');
            const app = document.querySelector('lightning-out-application');
            
            try {
                console.log('🔐 Fetching guest session from Salesforce...');
                console.log('API URL:', '/api/guest-session');
                
                // Call the guest session endpoint
                const response = await fetch('/api/guest-session');
                
                console.log('Response status:', response.status);
                console.log('Response OK:', response.ok);
                
                if (!response.ok) {
                    let errorText = await response.text();
                    console.log('Error response body:', errorText);
                    
                    let errorJson;
                    try {
                        errorJson = JSON.parse(errorText);
                    } catch(e) {
                        errorJson = { error: errorText };
                    }
                    
                    throw new Error(errorJson.error || errorJson.message || `HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Response data keys:', Object.keys(data));
                
                const { frontdoorUrl, instanceUrl } = data;
                
                if (!frontdoorUrl) {
                    throw new Error('No frontdoor URL received from server');
                }
                
                console.log('✅ Session obtained, initializing Lightning Out...');
                console.log('Frontdoor URL preview:', frontdoorUrl.substring(0, 100) + '...');
                
                // Set the frontdoor URL on the component
                app.setAttribute('frontdoor-url', frontdoorUrl);
                
                // Listen for ready event
                app.addEventListener('lo.application.ready', () => {
                    console.log('✅ Lightning Out component loaded successfully!');
                    loadingDiv.style.display = 'none';
                });
                
                // Listen for errors from Lightning Out
                app.addEventListener('lo.application.error', (e) => {
                    console.error('❌ Lightning Out error:', e.detail);
                    loadingDiv.style.display = 'none';
                    showError(e.detail?.message || 'Failed to load Salesforce component', JSON.stringify(e.detail, null, 2));
                });
                
                // Set a timeout in case the component never loads
                const timeoutId = setTimeout(() => {
                    if (loadingDiv.style.display !== 'none') {
                        loadingDiv.style.display = 'none';
                        showError('Component loading timeout. Please check your Salesforce configuration.', 
                            'The Lightning Out component did not load within 30 seconds.');
                    }
                }, 30000);
                
                // Clear timeout if component loads
                app.addEventListener('lo.application.ready', () => {
                    clearTimeout(timeoutId);
                });
                
            } catch (error) {
                console.error('❌ Initialization error:', error);
                loadingDiv.style.display = 'none';
                showError(error.message || 'Failed to connect to enrollment system', error.stack);
            }
        }
        
        function showError(message, details) {
            const errorDiv = document.getElementById('error-container');
            const errorMessage = document.getElementById('error-message');
            const errorDetails = document.getElementById('error-details');
            
            errorMessage.textContent = message;
            
            if (details) {
                errorDetails.textContent = details;
                errorDetails.style.display = 'block';
            }
            
            errorDiv.style.display = 'block';
        }
        
        // Start the application when page loads
        document.addEventListener('DOMContentLoaded', initGuestLightningOut);
    </script>
</body>
</html>
