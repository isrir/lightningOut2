<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Salesforce Sans', Arial, sans-serif;
            background: #f3f3f3;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
        }

        #app-wrapper {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 2rem;
            min-height: 300px;
            position: relative;
        }

        #loading {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 14px;
        }

        #loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #c23934;
        }

        #error-container p { margin-bottom: 12px; font-size: 14px; }
        #error-container button {
            padding: 8px 20px;
            background: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        #debug-info {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
            display: none;
            border-left: 3px solid #0070d2;
            max-height: 300px;
            overflow-y: auto;
        }

        #debug-info.show {
            display: block;
        }

        #debug-info pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        lightning-out-application {
            width: 100%;
            height: 400px;
            display: block;
            min-height: 400px;
        }
        
        /* Force iframe visibility */
        iframe {
            display: block !important;
            width: 100% !important;
            height: 400px !important;
            border: none !important;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">

        <div id="loading">
            <div class="spinner"></div>
            <div>Loading enrollment form…</div>
            <div style="font-size:12px;color:#888;margin-top:6px;">
                Establishing secure connection
            </div>
        </div>

        <div id="error-container">
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <!-- Container where we'll inject the element programmatically -->
        <div id="lo-container"></div>

        <div id="debug-info">
            <strong>Debug Info:</strong>
            <pre id="debug-content"></pre>
        </div>

    </div>

    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

    <script>
        const loadingDiv     = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage   = document.getElementById('error-message');
        const loContainer    = document.getElementById('lo-container');
        const debugDiv       = document.getElementById('debug-info');
        const debugContent   = document.getElementById('debug-content');
        
        let loApp = null;
        let debugMessages = [];
        let iframeFixAttempts = 0;

        function addDebug(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            debugMessages.push({ timestamp, message, data });
            // Keep only last 30 messages
            if (debugMessages.length > 30) debugMessages.shift();
            
            debugContent.textContent = debugMessages.map(m => 
                `[${m.timestamp}] ${m.message}${m.data ? '\n' + JSON.stringify(m.data, null, 2) : ''}`
            ).join('\n\n');
            
            if (!debugDiv.classList.contains('show')) {
                debugDiv.classList.add('show');
            }
            console.log(`[${timestamp}]`, message, data || '');
        }

        function showError(msg) {
            addDebug('ERROR: ' + msg);
            loadingDiv.style.display     = 'none';
            errorMessage.textContent     = msg;
            errorContainer.style.display = 'block';
        }

        // Function to find and fix iframe visibility
        function fixIframeVisibility() {
            iframeFixAttempts++;
            addDebug(`Attempting to fix iframe visibility (attempt ${iframeFixAttempts})`);
            
            // Try multiple selectors to find the iframe
            const iframes = document.querySelectorAll('iframe');
            addDebug(`Found ${iframes.length} iframes in document`);
            
            iframes.forEach((iframe, index) => {
                addDebug(`Iframe ${index}:`, {
                    src: iframe.src?.substring(0, 100),
                    display: iframe.style.display,
                    visibility: iframe.style.visibility,
                    computedDisplay: window.getComputedStyle(iframe).display
                });
                
                // Force iframe to be visible
                iframe.style.display = 'block';
                iframe.style.visibility = 'visible';
                iframe.style.width = '100%';
                iframe.style.height = '400px';
                iframe.style.border = 'none';
                
                // Also try to find iframe inside shadow DOM
                if (loApp && loApp.shadowRoot) {
                    const shadowIframe = loApp.shadowRoot.querySelector('iframe');
                    if (shadowIframe && shadowIframe !== iframe) {
                        addDebug('Found iframe in shadowRoot, fixing too');
                        shadowIframe.style.display = 'block';
                        shadowIframe.style.width = '100%';
                        shadowIframe.style.height = '400px';
                    }
                }
            });
            
            if (iframes.length === 0 && iframeFixAttempts < 20) {
                // Keep trying every 500ms until we find iframes
                setTimeout(fixIframeVisibility, 500);
            } else if (iframes.length > 0) {
                addDebug(`✅ Fixed ${iframes.length} iframe(s) visibility`);
                // Hide loading after iframe is visible
                if (loadingDiv.style.display !== 'none') {
                    loadingDiv.style.display = 'none';
                }
            }
        }

        // Also watch for DOM mutations to catch iframes when they're added
        const observer = new MutationObserver((mutations) => {
            let hasIframeChanges = false;
            mutations.forEach((mutation) => {
                if (mutation.type === 'childList') {
                    mutation.addedNodes.forEach((node) => {
                        if (node.nodeName === 'IFRAME') {
                            addDebug('🎯 Iframe added to DOM via mutation');
                            hasIframeChanges = true;
                        } else if (node.querySelectorAll) {
                            const iframes = node.querySelectorAll('iframe');
                            if (iframes.length > 0) {
                                addDebug(`🎯 ${iframes.length} iframe(s) added via mutation`);
                                hasIframeChanges = true;
                            }
                        }
                    });
                }
            });
            if (hasIframeChanges) {
                setTimeout(fixIframeVisibility, 100);
            }
        });

        // Start observing
        observer.observe(document.body, { childList: true, subtree: true });

        async function getFrontdoorUrl() {
            addDebug('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                addDebug(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || `Session API returned ${response.status}`);
                }
                const data = await response.json();
                addDebug('API Response data received', { hasFrontdoorUrl: !!data.frontdoorUrl });
                
                if (!data.frontdoorUrl) throw new Error('No frontdoorUrl in response');
                return data.frontdoorUrl;
            } catch (error) {
                addDebug(`Fetch error: ${error.message}`);
                throw error;
            }
        }

        async function init() {
            addDebug('Initializing Lightning Out Application');
            try {
                // Create the element programmatically
                loApp = document.createElement('lightning-out-application');
                loApp.id = 'loApp';
                loApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                loApp.setAttribute('components', 'c-learning-program-form');
                
                addDebug('Created lightning-out-application element', { 
                    id: loApp.id, 
                    appId: '1UsdN00000025rdSAA',
                    components: 'c-learning-program-form'
                });
                
                // Append to container
                loContainer.appendChild(loApp);
                addDebug('Appended element to DOM');
                
                const frontdoorUrl = await getFrontdoorUrl();
                addDebug(`Setting frontdoor-url: ${frontdoorUrl.substring(0, 100)}...`);
                loApp.setAttribute('frontdoor-url', frontdoorUrl);
                
                // Start trying to fix iframe visibility immediately
                setTimeout(fixIframeVisibility, 500);
                setTimeout(fixIframeVisibility, 1500);
                setTimeout(fixIframeVisibility, 3000);

                loApp.addEventListener('lo.application.ready', () => {
                    addDebug('✅ lo.application.ready - Component loaded successfully');
                    // Try to fix iframe again when component is ready
                    setTimeout(fixIframeVisibility, 100);
                });

                loApp.addEventListener('lo.application.error', (event) => {
                    addDebug('❌ lo.application.error', event.detail);
                    showError(event.detail?.message || 'Failed to load component');
                });

                loApp.addEventListener('lo.iframe.load', (event) => {
                    addDebug('📄 lo.iframe.load - Iframe loaded', { origin: event.detail });
                    // Fix iframe as soon as it loads
                    setTimeout(fixIframeVisibility, 50);
                });

                loApp.addEventListener('lo.iframe.error', (event) => {
                    addDebug('❌ lo.iframe.error', event.detail);
                });

                loApp.addEventListener('lo.component.ready', (event) => {
                    addDebug('✅ lo.component.ready - Component instance ready');
                    setTimeout(fixIframeVisibility, 100);
                });

                loApp.addEventListener('lo.component.error', (event) => {
                    addDebug('❌ lo.component.error', event.detail);
                });

                // Timeout handler
                setTimeout(() => {
                    if (loadingDiv.style.display !== 'none') {
                        addDebug('⏰ Loading timeout (30 seconds)');
                        // Check if iframes exist but might be hidden
                        const iframes = document.querySelectorAll('iframe');
                        if (iframes.length > 0) {
                            addDebug(`Found ${iframes.length} iframe(s) but still timing out - forcing visibility`);
                            fixIframeVisibility();
                            setTimeout(() => {
                                if (loadingDiv.style.display !== 'none') {
                                    loadingDiv.style.display = 'none';
                                }
                            }, 1000);
                        } else {
                            showError('Loading timed out — please refresh.');
                        }
                    }
                }, 30000);

            } catch (error) {
                addDebug(`Init error: ${error.message}`, { stack: error.stack });
                showError(error.message);
            }
        }

        // Wait for LO2 script to load and custom element to be defined
        if (customElements.get('lightning-out-application')) {
            addDebug('Custom element already registered');
            init();
        } else {
            addDebug('Waiting for custom element registration...');
            window.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => {
                    if (customElements.get('lightning-out-application')) {
                        addDebug('Custom element registered, starting initialization');
                        init();
                    } else {
                        addDebug('ERROR: lightning-out-application not registered after delay');
                        showError('Lightning Out component not loaded properly');
                    }
                }, 100);
            });
        }
    </script>
</body>
</html>
