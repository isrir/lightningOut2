<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Salesforce Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f3f3 0%, #e8e8e8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        #app-wrapper {
            width: 100%;
            max-width: 800px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 2rem;
            min-height: 500px;
            position: relative;
        }

        #loading {
            text-align: center;
            padding: 60px 20px;
            color: #555;
            font-size: 14px;
        }

        #loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-container {
            display: none;
            text-align: center;
            padding: 60px 20px;
            color: #c23934;
        }

        #error-container p { margin-bottom: 16px; font-size: 14px; }
        #error-container button {
            padding: 10px 24px;
            background: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        #error-container button:hover {
            background: #005fb2;
        }

        #lo-container {
            width: 100%;
            min-height: 400px;
            position: relative;
        }

        #debug-info {
            margin-top: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            display: none;
            border-left: 3px solid #0070d2;
            max-height: 250px;
            overflow-y: auto;
        }

        #debug-info.show {
            display: block;
        }

        #debug-info strong {
            display: block;
            margin-bottom: 8px;
            color: #0070d2;
        }

        #debug-info pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 10px;
            line-height: 1.4;
        }

        /* Ensure any iframe becomes visible */
        iframe {
            display: block !important;
            width: 100% !important;
            min-height: 400px !important;
            border: none !important;
            visibility: visible !important;
        }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div id="loading">
            <div class="spinner"></div>
            <div>Loading enrollment form…</div>
            <div style="font-size:12px;color:#888;margin-top:8px;">
                Connecting to Salesforce securely
            </div>
        </div>

        <div id="error-container">
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <div id="lo-container"></div>

        <div id="debug-info">
            <strong>🔍 Debug Information</strong>
            <pre id="debug-content"></pre>
        </div>
    </div>

    <!-- Salesforce Lightning Out Library -->
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

    <script>
        // DOM Elements
        const loadingDiv = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const loContainer = document.getElementById('lo-container');
        const debugDiv = document.getElementById('debug-info');
        const debugContent = document.getElementById('debug-content');
        
        // State
        let debugMessages = [];
        let retryCount = 0;
        let iframeObserver = null;

        // Helper: Add debug message
        function addDebug(message, data = null) {
            const timestamp = new Date().toLocaleTimeString();
            debugMessages.unshift({ timestamp, message, data }); // Show newest first
            // Keep last 25 messages
            if (debugMessages.length > 25) debugMessages.pop();
            
            debugContent.textContent = debugMessages.map(m => 
                `[${m.timestamp}] ${m.message}${m.data ? '\n' + JSON.stringify(m.data, null, 2) : ''}`
            ).join('\n\n');
            
            if (!debugDiv.classList.contains('show')) {
                debugDiv.classList.add('show');
            }
            console.log(`[${timestamp}]`, message, data || '');
        }

        // Helper: Show error
        function showError(msg, details = null) {
            addDebug('❌ ERROR: ' + msg, details);
            loadingDiv.style.display = 'none';
            errorMessage.textContent = msg;
            errorContainer.style.display = 'block';
        }

        // Helper: Hide error
        function hideError() {
            errorContainer.style.display = 'none';
        }

        // Helper: Get frontdoor URL from API
        async function getFrontdoorUrl() {
            addDebug('Fetching frontdoor URL from /api/guest-session');
            try {
                const response = await fetch('/api/guest-session');
                addDebug(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `HTTP ${response.status}`);
                }
                
                const data = await response.json();
                addDebug('API Response received', { 
                    hasFrontdoorUrl: !!data.frontdoorUrl,
                    urlLength: data.frontdoorUrl?.length || 0
                });
                
                if (!data.frontdoorUrl) {
                    throw new Error('No frontdoorUrl in API response');
                }
                
                return data.frontdoorUrl;
            } catch (error) {
                addDebug(`Failed to get frontdoor URL: ${error.message}`);
                throw error;
            }
        }

        // Function to monitor and fix iframe visibility
        function monitorIframes() {
            const iframes = document.querySelectorAll('iframe');
            if (iframes.length > 0) {
                addDebug(`🎯 Found ${iframes.length} iframe(s) - ensuring visibility`);
                iframes.forEach((iframe, idx) => {
                    const wasHidden = iframe.style.display === 'none';
                    iframe.style.display = 'block';
                    iframe.style.visibility = 'visible';
                    iframe.style.width = '100%';
                    iframe.style.minHeight = '400px';
                    iframe.style.border = 'none';
                    
                    if (wasHidden) {
                        addDebug(`✅ Fixed iframe ${idx + 1} visibility`);
                    }
                });
                
                // Hide loading if iframes exist and are visible
                if (loadingDiv.style.display !== 'none') {
                    setTimeout(() => {
                        loadingDiv.style.display = 'none';
                        addDebug('Loading hidden - iframe(s) detected');
                    }, 500);
                }
                return true;
            }
            return false;
        }

        // Setup mutation observer to catch iframes when added
        function setupIframeObserver() {
            if (iframeObserver) return;
            
            iframeObserver = new MutationObserver((mutations) => {
                let hasNewIframes = false;
                
                mutations.forEach((mutation) => {
                    if (mutation.type === 'childList') {
                        mutation.addedNodes.forEach((node) => {
                            if (node.nodeName === 'IFRAME') {
                                hasNewIframes = true;
                            } else if (node.querySelectorAll) {
                                const iframes = node.querySelectorAll('iframe');
                                if (iframes.length > 0) hasNewIframes = true;
                            }
                        });
                    }
                });
                
                if (hasNewIframes) {
                    addDebug('🔔 New iframe(s) detected via observer');
                    setTimeout(monitorIframes, 100);
                }
            });
            
            iframeObserver.observe(document.body, { childList: true, subtree: true });
            addDebug('Iframe observer started');
        }

        // Main initialization using Lightning Out API
        async function initLightningOut() {
            addDebug('🚀 Initializing Lightning Out Application');
            hideError();
            
            try {
                // Clear container
                loContainer.innerHTML = '';
                
                // Create container for Lightning component
                const componentContainer = document.createElement('div');
                componentContainer.id = 'lightning-component-container';
                componentContainer.style.width = '100%';
                componentContainer.style.minHeight = '400px';
                loContainer.appendChild(componentContainer);
                
                addDebug('Created component container', { id: componentContainer.id });
                
                // Get frontdoor URL for authentication
                const frontdoorUrl = await getFrontdoorUrl();
                addDebug(`Frontdoor URL obtained (length: ${frontdoorUrl.length})`);
                
                // Check if Lightning is available
                if (typeof $Lightning === 'undefined') {
                    throw new Error('Lightning Out library not loaded. Check your internet connection.');
                }
                
                addDebug('$Lightning object available', {
                    use: typeof $Lightning.use,
                    createComponent: typeof $Lightning.createComponent
                });
                
                // Extract session ID from frontdoor URL
                const urlParams = new URLSearchParams(frontdoorUrl.split('?')[1]);
                const sessionId = urlParams.get('sid');
                if (sessionId) {
                    addDebug('Session ID extracted', { length: sessionId.length });
                }
                
                // Set a timeout for the entire loading process
                const loadingTimeout = setTimeout(() => {
                    addDebug('⏰ Loading timeout (45 seconds) - checking if iframes exist');
                    const hasIframes = monitorIframes();
                    if (!hasIframes && loadingDiv.style.display !== 'none') {
                        showError('Loading timed out. The component may not be properly configured in Salesforce.');
                    } else if (hasIframes) {
                        loadingDiv.style.display = 'none';
                    }
                }, 45000);
                
                // Use Lightning Out API
                addDebug('Calling $Lightning.use()...');
                $Lightning.use(
                    '1UsdN00000025rdSAA',  // App ID
                    function() {
                        addDebug('✅ App loaded successfully');
                        
                        // Create the component
                        addDebug('Creating component: c:learningProgramForm');
                        $Lightning.createComponent(
                            'c:learningProgramForm',  // Component name
                            {},  // Attributes
                            'lightning-component-container',  // Target container ID
                            function(component) {
                                addDebug('✅ Component creation callback fired', {
                                    componentExists: !!component,
                                    componentType: component?.toString?.() || 'unknown'
                                });
                                
                                clearTimeout(loadingTimeout);
                                
                                // Monitor for iframes
                                setTimeout(() => {
                                    const iframesPresent = monitorIframes();
                                    if (!iframesPresent) {
                                        addDebug('⚠️ No iframes found yet - will continue monitoring');
                                        // Keep checking for iframes
                                        let checkCount = 0;
                                        const interval = setInterval(() => {
                                            checkCount++;
                                            const found = monitorIframes();
                                            if (found || checkCount > 20) {
                                                clearInterval(interval);
                                                if (!found) {
                                                    addDebug('❌ No iframes detected after 10 seconds');
                                                    // Try alternative approach - check container content
                                                    const container = document.getElementById('lightning-component-container');
                                                    addDebug('Container content check', {
                                                        innerHTML: container.innerHTML?.substring(0, 200),
                                                        children: container.children.length,
                                                        hasContent: container.innerHTML?.length > 0
                                                    });
                                                }
                                            }
                                        }, 500);
                                    }
                                }, 500);
                            },
                            function(error) {
                                addDebug('❌ Component creation error', error);
                                clearTimeout(loadingTimeout);
                                showError('Failed to create component: ' + JSON.stringify(error));
                            }
                        );
                    },
                    function(error) {
                        addDebug('❌ App loading error', error);
                        clearTimeout(loadingTimeout);
                        showError('Failed to load Lightning app: ' + JSON.stringify(error));
                    },
                    frontdoorUrl  // Pass frontdoor URL for authentication
                );
                
                // Also try the custom element approach as fallback
                setTimeout(() => {
                    if (loadingDiv.style.display !== 'none' && !document.querySelector('iframe')) {
                        addDebug('🔄 Trying fallback: Custom element approach');
                        tryFallbackElement(frontdoorUrl);
                    }
                }, 10000);
                
            } catch (error) {
                addDebug('❌ Initialization error', { message: error.message, stack: error.stack });
                showError(error.message);
            }
        }
        
        // Fallback: Use lightning-out-application custom element
        async function tryFallbackElement(frontdoorUrl) {
            addDebug('Attempting fallback with lightning-out-application element');
            
            try {
                const loContainer = document.getElementById('lo-container');
                const existingContainer = document.getElementById('lightning-component-container');
                if (existingContainer) existingContainer.remove();
                
                // Create custom element
                const loApp = document.createElement('lightning-out-application');
                loApp.id = 'loAppFallback';
                loApp.setAttribute('app-id', '1UsdN00000025rdSAA');
                loApp.setAttribute('components', 'c-learning-program-form');
                loApp.setAttribute('frontdoor-url', frontdoorUrl);
                loApp.style.width = '100%';
                loApp.style.minHeight = '400px';
                loApp.style.display = 'block';
                
                // Add event listeners
                loApp.addEventListener('lo.application.ready', () => {
                    addDebug('✅ Fallback: lo.application.ready');
                    setTimeout(monitorIframes, 500);
                });
                
                loApp.addEventListener('lo.iframe.load', () => {
                    addDebug('✅ Fallback: lo.iframe.load');
                    setTimeout(monitorIframes, 100);
                });
                
                loApp.addEventListener('lo.application.error', (e) => {
                    addDebug('❌ Fallback: lo.application.error', e.detail);
                });
                
                loContainer.appendChild(loApp);
                addDebug('Fallback element appended to DOM');
                
                // Monitor for iframes
                setTimeout(monitorIframes, 1000);
                setTimeout(monitorIframes, 3000);
                setTimeout(monitorIframes, 5000);
                
            } catch (error) {
                addDebug('Fallback also failed', { error: error.message });
            }
        }
        
        // Start the application
        function start() {
            addDebug('Starting application...');
            setupIframeObserver();
            
            // Check if custom element is registered
            if (customElements.get('lightning-out-application')) {
                addDebug('Custom element already registered');
            }
            
            // Initialize Lightning Out
            initLightningOut();
        }
        
        // Wait for DOM and script to be ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', start);
        } else {
            start();
        }
        
        // Manual retry function (can be called from console if needed)
        window.retryLightning = function() {
            addDebug('Manual retry triggered');
            location.reload();
        };
    </script>
</body>
</html>
