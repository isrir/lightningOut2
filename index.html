<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Program Enrollment</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Salesforce Sans', Arial, sans-serif;
            background: #f3f3f3;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
        }

        #app-wrapper {
            width: 100%;
            max-width: 600px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 2rem;
            min-height: 300px;
        }

        #loading {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 14px;
        }

        #loading .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e0e0e0;
            border-top-color: #0070d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #c23934;
        }

        #error-container p    { margin-bottom: 12px; font-size: 14px; }
        #error-container button {
            padding: 8px 20px;
            background: #0070d2;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        /*
         * DO NOT set display:block here.
         * LO2 connectedCallback sets display:none via inline style using ||=
         * It will only show the element itself after lo.application.ready.
         * We only need to guarantee a height so the child 100% chain resolves.
         */
        lightning-out-application {
            width: 100%;
            /*
             * height must be set as an attribute or inline BEFORE connectedCallback.
             * The ||= in LO2 source means: only sets if falsy, so pre-setting wins.
             * We set it in the <script> block below before the element connects.
             */
        }

        c-learning-program-form {
            /*
             * Also pre-set via script below, but this is a fallback.
             * The iframe inside uses height:100%, so this element needs a real height.
             */
            display: block;
            width: 100%;
            height: 400px;
        }
    </style>

    <!--
        Load LO2 script AFTER the element is in the DOM so connectedCallback
        fires after we've pre-set the height attribute.
        We move this to end of body.
    -->
</head>
<body>
    <div id="app-wrapper">

        <div id="loading">
            <div class="spinner"></div>
            <div>Loading enrollment form…</div>
            <div style="font-size:12px;color:#888;margin-top:6px;">
                Establishing secure connection
            </div>
        </div>

        <div id="error-container">
            <p id="error-message"></p>
            <button onclick="location.reload()">Retry</button>
        </div>

        <!--
            Set height inline HERE, before LO2 script loads and calls
            connectedCallback. The ||= in LO2 source means our pre-set value wins.
        -->
        <lightning-out-application
            id="loApp"
            app-id="1UsdN00000025rdSAA"
            components="c-learning-program-form"
            style="width:100%; height:400px;">
        </lightning-out-application>

    </div>

    <!--
        IMPORTANT: LO2 script loads here, AFTER the element declaration above.
        This ensures our inline style is already on the element when
        connectedCallback runs and does: this.style.display ||= "none"
        Our height:400px is already set, so ||= won't touch it.
    -->
    <script src="https://creationtechnology4.my.salesforce.com/lightning/lightning.out.latest/index.iife.prod.js"></script>

    <script>
        const loApp          = document.getElementById('loApp');
        const loadingDiv     = document.getElementById('loading');
        const errorContainer = document.getElementById('error-container');
        const errorMessage   = document.getElementById('error-message');

        function showError(msg) {
            loadingDiv.style.display     = 'none';
            errorMessage.textContent     = msg;
            errorContainer.style.display = 'block';
        }

        async function getFrontdoorUrl() {
            const response = await fetch('/api/guest-session');
            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err.error || `Session API returned ${response.status}`);
            }
            const data = await response.json();
            if (!data.frontdoorUrl) throw new Error('No frontdoorUrl in response');
            return data.frontdoorUrl;
        }

        async function init() {
            try {
                const frontdoorUrl = await getFrontdoorUrl();
                console.log('Setting frontdoor URL');

                /*
                 * Setting frontdoor-url triggers _propertyChanged_frontdoorUrl
                 * in LO2 source → calls #z() → loads the hidden auth iframe.
                 * After auth iframe posts lo.loaded, LO2 fires lo.application.ready
                 * and sets display:block on lightning-out-application automatically.
                 * We don't need to touch display at all.
                 */
                loApp.setAttribute('frontdoor-url', frontdoorUrl);

                loApp.addEventListener('lo.application.ready', () => {
                    console.log('✅ Component ready');
                    loadingDiv.style.display = 'none';
                    /*
                     * LO2 sets display:block on loApp automatically here.
                     * The component iframe (inside closed shadow of c-learning-program-form)
                     * uses height:100% → inherits 400px from our inline style above.
                     * No iframe manipulation needed — closed shadow blocks it anyway.
                     */
                });

                loApp.addEventListener('lo.application.error', (event) => {
                    console.error('LO2 error:', event.detail);
                    showError(event.detail?.message || 'Failed to load component');
                });

                setTimeout(() => {
                    if (loadingDiv.style.display !== 'none') {
                        showError('Loading timed out — please refresh.');
                    }
                }, 30000);

            } catch (error) {
                console.error('Init error:', error);
                showError(error.message);
            }
        }

        init();
    </script>
</body>
</html>
